# Upstream Backend com least_conn e health checks
upstream backend_servers {
    least_conn;
    keepalive 32;

    server backend1:5000 max_fails=3 fail_timeout=30s weight=10;
    server backend2:5000 max_fails=3 fail_timeout=30s weight=8;
    server backend3:5000 max_fails=3 fail_timeout=30s weight=12;
}

upstream admin_servers {
    server admin:8080 max_fails=3 fail_timeout=30s;
}

# Frontend HTTP
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# Frontend HTTPS
server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Frontend
    location / {
        root /usr/share/nginx/html/frontend;
        index index.html produtos.html carrinho.html;
        try_files $uri $uri/ /index.html;
        limit_req zone=frontend burst=100 nodelay;
    }

    # API Backend
    location /api/ {
        proxy_pass http://backend_servers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        limit_req zone=api burst=20 nodelay;

        # Health check
        location /api/health {
            access_log off;
            proxy_pass http://backend_servers/health;
        }
    }

    # Admin Panel
    location /admin/ {
        proxy_pass http://admin_servers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx Status
    location /nginx-status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # Health global
    location /health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }
}

